name: AI Testing Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install streamlit groq pytest python-dotenv chromadb pytest-cov

      - name: Run pytest with coverage
        run: python -m pytest tests/test_generated.py -v --tb=short --cov=sample_code --cov-report=term-missing
